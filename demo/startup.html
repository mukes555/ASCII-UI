<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuralForge — AI Infrastructure</title>
    <link rel="stylesheet" href="../ascii-ui.css">
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            color: #e0e0e0;
            overflow: hidden;
        }

        #app {
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>
    <div id="app"></div>
    <script>
        window.onerror = function (message, source, lineno, colno, error) {
            const errDiv = document.createElement('div');
            errDiv.style.cssText = 'position:fixed;top:0;left:0;width:100%;background:red;color:white;padding:10px;font-family:monospace;z-index:9999';
            errDiv.innerText = `Error: ${message}\n${source}:${lineno}`;
            document.body.appendChild(errDiv);
        };
    </script>
    <script type="module" src="./startup.js"></script>
</body>

</html>
